<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>bKash Payment | Life GrowBD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .bkash-gradient { background: linear-gradient(135deg, #D12053 0%, #a51742 100%); }
        .toast-custom {
            visibility: hidden; min-width: 280px; background: #1e293b; color: white;
            text-align: center; border-radius: 2rem; padding: 12px 20px; position: fixed;
            z-index: 1000; bottom: 30px; left: 50%; transform: translateX(-50%) scale(0.9);
            opacity: 0; transition: all 0.25s ease; font-weight: 600;
            background: rgba(30,41,59,0.95); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.2);
        }
        .toast-custom.show { visibility: visible; opacity: 1; transform: translateX(-50%) scale(1); }
        .loading-spinner {
            display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        .trx-input:focus { box-shadow: 0 0 0 3px rgba(209,32,83,0.2); border-color: #D12053; outline: none; }
        .copy-card:active { transform: scale(0.98); }
        .btn-pulse:active { transform: scale(0.97); }
        .video-help {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 1rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #f59e0b;
        }
        .video-help:hover { transform: scale(1.02); background: linear-gradient(135deg, #fde68a 0%, #fcd34d 100%); }
        .video-help a { color: #92400e; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-200 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="bkash-gradient p-6 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-white/20 backdrop-blur-sm p-2 rounded-xl">
                        <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 13c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z"/>
                        </svg>
                    </div>
                    <span class="text-white font-black text-xl tracking-tight">Life GrowBD</span>
                </div>
                <div class="text-white text-right">
                    <p class="text-[10px] uppercase font-bold opacity-80">Payable Amount</p>
                    <h2 class="text-3xl font-black">৳ <span id="display-amount">0</span></h2>
                </div>
            </div>

            <div class="p-6 pt-7">
                <!-- Video Help Section -->
                <div class="video-help" onclick="window.open('https://youtu.be/7h8Ww73tSos?si=MKBDFqTgLC_LG3HA', '_blank')">
                    <a href="#" onclick="return false;">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M10 15l5-3-5-3v6z"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                        </svg>
                        🎥 কিভাবে ডিপোজিট ও ডেলিভারি চার্জ দিবেন? ভিডিও দেখুন
                    </a>
                </div>

                <div id="payment-type-badge" class="mb-4 text-center">
                    <span id="payment-type-text" class="text-xs font-bold px-4 py-2 rounded-full bg-gray-100 text-gray-600">ডেলিভারি চার্জ</span>
                </div>

                <div class="bg-pink-50 border-l-[5px] border-[#D12053] p-4 rounded-2xl mb-7">
                    <div class="flex gap-3">
                        <span class="text-[#D12053] text-xl">📌</span>
                        <p class="text-xs font-semibold text-gray-700">
                            <span class="font-black text-[#D12053]">Send Money</span> করুন নিচের bKash নম্বরে। টাকা পাঠানোর পর <span class="font-bold">TrxID</span> টি দিন।
                            <span class="block text-[11px] mt-1 text-gray-600">⚠️ একটি TrxID শুধু একবার ব্যবহার করা যাবে</span>
                        </p>
                    </div>
                </div>

                <div class="mb-8">
                    <label class="text-[11px] font-bold text-gray-500 uppercase block mb-2">bKash নম্বর</label>
                    <div id="number-container" onclick="copyNumber()" class="flex items-center justify-between bg-white p-5 rounded-2xl border-2 border-dashed border-pink-300 hover:border-[#D12053] hover:bg-pink-50 cursor-pointer transition-all">
                        <span id="display-number" class="text-3xl font-black text-gray-800">লোড হচ্ছে...</span>
                        <div class="bkash-gradient text-white p-2.5 rounded-xl">📋</div>
                    </div>
                    <p class="text-[10px] text-gray-400 text-center mt-2">🔁 নম্বর কপি করতে ক্লিক করুন</p>
                </div>

                <div class="mb-5">
                    <label class="text-[11px] font-bold text-gray-500 uppercase block mb-2">আপনার মোবাইল নাম্বার (রেজিস্টারকৃত)</label>
                    <input type="tel" id="user-phone" placeholder="01XXXXXXXXX" class="w-full p-4 bg-gray-50 border-2 border-gray-200 focus:border-[#D12053] focus:outline-none text-center font-mono font-bold rounded-2xl">
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="text-[11px] font-bold text-gray-500 uppercase block mb-2">Transaction ID (TrxID)</label>
                        <input type="text" id="trx-input" placeholder="যেমন: 8N7A9X2K5L" autocomplete="off" class="w-full p-5 bg-gray-50 border-2 border-gray-200 focus:border-[#D12053] focus:outline-none text-center font-mono font-bold text-xl uppercase rounded-2xl trx-input">
                    </div>
                    
                    <button id="submit-btn" onclick="sendPayment()" class="w-full bkash-gradient text-white font-bold py-5 rounded-2xl shadow-lg uppercase text-sm tracking-wider flex items-center justify-center gap-2 btn-pulse">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        পেমেন্ট নিশ্চিত করুন
                    </button>
                </div>
            </div>

            <div class="bg-gray-50 p-4 text-center border-t">
                <p class="text-[10px] text-gray-400 font-bold uppercase">🔒 Secure Payment • Life GrowBD</p>
            </div>
        </div>
    </div>

    <div id="toastMsg" class="toast-custom"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCTsWCt67Yq4loUn1oUbNJZ2vBrPpXZbvI",
            authDomain: "my-apps-1a158.firebaseapp.com",
            projectId: "my-apps-1a158",
            storageBucket: "my-apps-1a158.firebasestorage.app",
            messagingSenderId: "973100739981",
            appId: "1:973100739981:web:63d7d2acd2b715a70561c4",
            databaseURL: "https://my-apps-1a158-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const amountSpan = document.getElementById('display-amount');
        const numberSpan = document.getElementById('display-number');
        const trxInput = document.getElementById('trx-input');
        const userPhoneInput = document.getElementById('user-phone');
        const submitBtn = document.getElementById('submit-btn');
        const paymentTypeText = document.getElementById('payment-type-text');
        
        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amount') || "0";
        const type = urlParams.get('type') || "delivery";
        const orderId = urlParams.get('orderId') || "";
        
        amountSpan.innerText = amount;
        
        if(type === 'deposit') {
            paymentTypeText.innerText = "ডিপোজিট (টাকা জমা)";
            paymentTypeText.className = "text-xs font-bold px-4 py-2 rounded-full bg-green-100 text-green-600";
        } else {
            paymentTypeText.innerText = "ডেলিভারি চার্জ";
            paymentTypeText.className = "text-xs font-bold px-4 py-2 rounded-full bg-blue-100 text-blue-600";
        }
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = message;
            toast.style.background = isError ? "rgba(220, 38, 38, 0.95)" : "rgba(30, 41, 59, 0.95)";
            toast.className = "toast-custom show";
            setTimeout(() => toast.className = "toast-custom", 3000);
        }
        
        async function isTrxIdUnique(trxId) {
            if(!trxId) return false;
            const upperTrx = trxId.toUpperCase().trim();
            try {
                const snapshot = await db.ref('payment_requests').orderByChild('transactionId').equalTo(upperTrx).once('value');
                return !snapshot.exists();
            } catch(err) { return false; }
        }
        
        async function findUserByPhone(phone) {
            try {
                const snapshot = await db.ref('users').once('value');
                const users = snapshot.val();
                if(users) {
                    for(const [id, user] of Object.entries(users)) {
                        if(user.phone === phone) return { userId: id, userName: user.name };
                    }
                }
                return null;
            } catch(e) { return null; }
        }
        
        window.sendPayment = async function() {
            const trx = trxInput.value.trim();
            const userPhone = userPhoneInput.value.trim();
            
            if(!trx) { showToast("❌ TrxID দিন!", true); return; }
            if(!userPhone) { showToast("❌ আপনার মোবাইল নাম্বার দিন!", true); return; }
            if(userPhone.length < 11) { showToast("❌ সঠিক মোবাইল নাম্বার দিন!", true); return; }
            
            const finalTrx = trx.toUpperCase();
            const payAmount = parseFloat(amount);
            
            submitBtn.innerHTML = `<span class="loading-spinner"></span> যাচাই করা হচ্ছে...`;
            submitBtn.disabled = true;
            
            try {
                const isUnique = await isTrxIdUnique(finalTrx);
                if(!isUnique) {
                    showToast("⚠️ এই TrxID আগেই ব্যবহার করা হয়েছে!", true);
                    submitBtn.innerHTML = `পেমেন্ট নিশ্চিত করুন`;
                    submitBtn.disabled = false;
                    trxInput.value = "";
                    return;
                }
                
                const userInfo = await findUserByPhone(userPhone);
                if(!userInfo) {
                    showToast("❌ এই নাম্বারে কোনো ইউজার পাওয়া যায়নি!", true);
                    submitBtn.innerHTML = `পেমেন্ট নিশ্চিত করুন`;
                    submitBtn.disabled = false;
                    return;
                }
                
                await db.ref('payment_requests').push().set({
                    userId: userInfo.userId, userName: userInfo.userName, userPhone: userPhone,
                    amount: payAmount, transactionId: finalTrx, method: "bKash", type: type,
                    orderId: orderId, status: "pending", createdAt: new Date().toISOString()
                });
                
                if(type === 'delivery') {
                    await db.ref('delivery_requests').push().set({
                        userId: userInfo.userId, userName: userInfo.userName, userPhone: userPhone,
                        amount: payAmount, transactionId: finalTrx, method: "bKash", orderId: orderId,
                        status: "pending", createdAt: new Date().toISOString()
                    });
                } else if(type === 'deposit') {
                    await db.ref('deposit_requests').push().set({
                        userId: userInfo.userId, userName: userInfo.userName, userPhone: userPhone,
                        amount: payAmount, transactionId: finalTrx, method: "bKash",
                        status: "pending", createdAt: new Date().toISOString()
                    });
                }
                
                showToast(`✅ ${type === 'deposit' ? 'ডিপোজিট' : 'পেমেন্ট'} রিকোয়েস্ট সফল!`);
                trxInput.value = "";
                userPhoneInput.value = "";
                submitBtn.innerHTML = `পেমেন্ট নিশ্চিত করুন`;
                submitBtn.disabled = false;
                
                setTimeout(() => window.location.href = "https://lifegrowbd.com/", 2000);
                
            } catch (err) {
                showToast("❌ পেমেন্ট জমা দিতে ব্যর্থ!", true);
                submitBtn.innerHTML = `পেমেন্ট নিশ্চিত করুন`;
                submitBtn.disabled = false;
            }
        };
        
        db.ref('settings').on('value', (snapshot) => {
            const settings = snapshot.val();
            numberSpan.innerText = (settings && settings.bkashNumber) ? settings.bkashNumber : "01750069517";
        });
        
        window.copyNumber = function() {
            let numberText = numberSpan.innerText;
            if(!numberText || numberText === "লোড হচ্ছে...") { showToast("❌ নম্বর পাওয়া যায়নি", true); return; }
            navigator.clipboard.writeText(numberText.replace(/[^\d+]/g, '')).then(() => showToast("📋 bKash নম্বর কপি হয়েছে!"));
        };
        
        trxInput.addEventListener("input", function(e) { this.value = this.value.toUpperCase(); });
        trxInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendPayment(); });
        userPhoneInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendPayment(); });
        
        console.log("✅ bKash পেমেন্ট সিস্টেম রেডি | টাইপ:", type);
    </script>
</body>
</html>
