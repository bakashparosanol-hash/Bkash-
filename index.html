<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>bKash Payment | Sotota Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .bkash-gradient { background: linear-gradient(135deg, #D12053 0%, #a51742 100%); }
        .toast-custom {
            visibility: hidden; min-width: 280px; background: #1e293b; color: white;
            text-align: center; border-radius: 2rem; padding: 12px 20px; position: fixed;
            z-index: 1000; bottom: 30px; left: 50%; transform: translateX(-50%) scale(0.9);
            opacity: 0; transition: all 0.25s ease; font-weight: 600; backdrop-filter: blur(8px);
            background: rgba(30,41,59,0.95); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.2);
        }
        .toast-custom.show { visibility: visible; opacity: 1; transform: translateX(-50%) scale(1); }
        .loading-spinner {
            display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        button:disabled { opacity: 0.7; cursor: not-allowed; transform: scale(0.98); }
        .trx-input:focus { box-shadow: 0 0 0 3px rgba(209,32,83,0.2); border-color: #D12053; }
        .copy-card:active { transform: scale(0.98); }
        .skeleton-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 12px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .payment-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .btn-pulse:active { transform: scale(0.97); }
        .bg-pink-soft { background-color: #fff0f3; }
        .text-bkash { color: #D12053; }
        .border-bkash { border-color: #D12053; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-200 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full payment-card">
        <!-- Main Card -->
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <!-- Header with bKash Branding -->
            <div class="bkash-gradient p-6 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-white/20 backdrop-blur-sm p-2 rounded-xl">
                        <svg class="w-8 h-8 text-white" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 13c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z"/>
                        </svg>
                    </div>
                    <span class="text-white font-black text-xl tracking-tight">bKash Merchant</span>
                </div>
                <div class="text-white text-right">
                    <p class="text-[10px] uppercase font-bold opacity-80 tracking-[0.15em]">Payable Amount</p>
                    <h2 class="text-3xl font-black tracking-tight">৳ <span id="display-amount" class="tabular-nums">0</span></h2>
                </div>
            </div>

            <div class="p-6 pt-7">
                <!-- Info Alert -->
                <div class="bg-pink-50 border-l-[5px] border-[#D12053] p-4 rounded-2xl mb-7 shadow-sm">
                    <div class="flex items-start gap-3">
                        <span class="text-[#D12053] text-xl">📌</span>
                        <p class="text-xs font-semibold text-gray-700 leading-relaxed">
                            <span class="font-black text-[#D12053]">Send Money</span> করুন নিচের bKash নম্বরে। টাকা পাঠানোর পর <span class="font-bold">TrxID</span> টি দিন। 
                            <span class="block text-[11px] mt-1 text-gray-600">⚠️ একটি TrxID শুধু একবার ব্যবহার করা যাবে</span>
                        </p>
                    </div>
                </div>

                <!-- Personal Number Section (Merchant Number) with Copy & Loading -->
                <div class="mb-8">
                    <label class="text-[11px] font-bold text-gray-500 uppercase tracking-[0.1em] block mb-2 ml-1 flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1M9 12h.01"/></svg>
                        পেমেন্ট নম্বর (Personal Number)
                    </label>
                    <div id="number-container" onclick="copyNumber()" class="flex items-center justify-between bg-white p-5 rounded-2xl border-2 border-dashed border-pink-300 hover:border-[#D12053] hover:bg-pink-50 cursor-pointer transition-all duration-200 copy-card">
                        <span id="display-number" class="text-3xl font-black tracking-tighter text-gray-800">লোড হচ্ছে...</span>
                        <div class="bkash-gradient text-white p-2.5 rounded-xl shadow-md group-hover:scale-110 transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
                            </svg>
                        </div>
                    </div>
                    <p class="text-[10px] text-gray-400 text-center mt-3 font-medium tracking-wide">🔁 নম্বর কপি করতে উপরের কার্ডে ক্লিক করুন</p>
                </div>

                <!-- Transaction ID Input with Loading State -->
                <div class="space-y-6">
                    <div>
                        <label class="text-[11px] font-bold text-gray-500 uppercase ml-2 block mb-2 tracking-widest flex items-center gap-2">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                            Transaction ID (TrxID)
                        </label>
                        <input type="text" id="trx-input" placeholder="যেমন: 8N7A9X2K5L" autocomplete="off" class="w-full p-5 bg-gray-50 border-2 border-gray-200 focus:border-[#D12053] focus:outline-none text-center font-mono font-bold text-xl uppercase rounded-2xl transition-all trx-input">
                    </div>
                    
                    <button id="submit-btn" onclick="sendPayment()" class="w-full bkash-gradient text-white font-bold py-5 rounded-2xl shadow-lg uppercase text-sm tracking-widest transition-all duration-200 flex items-center justify-center gap-2 btn-pulse hover:shadow-xl">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        Confirm & Submit
                    </button>
                </div>
            </div>

            <!-- Footer -->
            <div class="bg-gray-50 p-4 text-center border-t">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest flex items-center justify-center gap-1">
                    <span>🔒 Secure Payment</span> • <span>Powered by Sotota Shop</span>
                </p>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toastMsg" class="toast-custom font-medium">✨ bKash নম্বর কপি হয়েছে!</div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAMfnJHzVyXCMgkPGJTEpom0bokbckAbZo",
            authDomain: "payment-a71bc.firebaseapp.com",
            projectId: "payment-a71bc",
            storageBucket: "payment-a71bc.firebasestorage.app",
            messagingSenderId: "904450864312",
            appId: "1:904450864312:web:9369048f1fb46e2b29304d"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // DOM Elements
        const amountSpan = document.getElementById('display-amount');
        const numberSpan = document.getElementById('display-number');
        const trxInput = document.getElementById('trx-input');
        const submitBtn = document.getElementById('submit-btn');
        
        // Get amount from URL
        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amount') || "0";
        amountSpan.innerText = amount;
        
        // Helper: Show Toast Message
        function showToast(message, isError = false) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = message || (isError ? "❌ সমস্যা হয়েছে!" : "✅ সফল!");
            if(isError) {
                toast.style.background = "rgba(185, 28, 28, 0.95)";
                toast.style.color = "#fff";
            } else {
                toast.style.background = "rgba(30, 41, 59, 0.95)";
                toast.style.color = "#fff";
            }
            toast.className = "toast-custom show";
            setTimeout(() => {
                toast.className = "toast-custom";
                setTimeout(() => {
                    toast.style.background = "rgba(30,41,59,0.95)";
                }, 300);
            }, 2800);
        }
        
        // -------- UNIQUE TrxID CHECK (এক TrxID দুইবার কাজ করবে না) --------
        // ফায়ারবেসে 'usedTrxids' collection অথবা payments এ আগে থেকে চেক করবো
        async function isTrxIdUnique(trxId) {
            if(!trxId) return false;
            const upperTrx = trxId.toUpperCase().trim();
            
            try {
                // প্রথমে payments collection এ এই TrxID আগে আছে কিনা চেক করি (Pending অথবা Approved সব ধরনের)
                const existingPayment = await db.collection("payments")
                    .where("trxid", "==", upperTrx)
                    .limit(1)
                    .get();
                
                if(!existingPayment.empty) {
                    return false; // TrxID already exists!
                }
                
                // অতিরিক্ত নিরাপত্তা: used_trxids collection এও চেক করতে পারি (ডুপ্লিকেট প্রতিরোধ)
                const usedRef = await db.collection("used_trxids").doc(upperTrx).get();
                if(usedRef.exists) {
                    return false;
                }
                
                return true;
            } catch (err) {
                console.error("TrxID check error:", err);
                return false;
            }
        }
        
        // Mark TrxID as used after successful submission (double protection)
        async function markTrxAsUsed(trxId) {
            try {
                await db.collection("used_trxids").doc(trxId).set({
                    trxid: trxId,
                    usedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch(e) { console.warn("mark used error", e); }
        }
        
        // -------- SEND PAYMENT WITH LOADING & UNIQUE TrxID VALIDATION --------
        window.sendPayment = async function() {
            const trx = trxInput.value.trim();
            if(!trx) {
                showToast("❌ অনুগ্রহ করে TrxID লিখুন!", true);
                return;
            }
            
            const finalTrx = trx.toUpperCase();
            const payAmount = amount;
            
            // Show loading state on button
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = `<span class="loading-spinner"></span> যাচাই করা হচ্ছে...`;
            submitBtn.disabled = true;
            
            try {
                // Step 1: Check if TrxID is unique (একবার ব্যবহার করা TrxID আবার নিবে না)
                const isUnique = await isTrxIdUnique(finalTrx);
                if(!isUnique) {
                    showToast("⚠️ এই TrxID আগেই ব্যবহার করা হয়েছে! ভিন্ন TrxID দিন।", true);
                    submitBtn.innerHTML = originalBtnText;
                    submitBtn.disabled = false;
                    trxInput.value = "";
                    trxInput.focus();
                    return;
                }
                
                // Step 2: Add to Firestore payments
                await db.collection("payments").add({
                    trxid: finalTrx,
                    amount: payAmount,
                    method: "bkash",
                    status: "Pending",
                    time: firebase.firestore.FieldValue.serverTimestamp(),
                    verified: false
                });
                
                // Step 3: Mark as used in separate collection to ensure uniqueness globally
                await markTrxAsUsed(finalTrx);
                
                // Success
                showToast("✅ পেমেন্ট রিকোয়েস্ট সফলভাবে জমা হয়েছে! অপেক্ষা করুন।");
                trxInput.value = ""; // clear input
                
                // Reset button
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
                
                // Optional: small haptic feedback
                trxInput.focus();
                
            } catch (err) {
                console.error("Payment Error:", err);
                let errorMsg = "❌ পেমেন্ট জমা দিতে ব্যর্থ! নেটওয়ার্ক চেক করুন।";
                if(err.message) errorMsg = `❌ ${err.message}`;
                showToast(errorMsg, true);
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            }
        };
        
        // -------- REAL-TIME LOADING: PERSONAL NUMBER (BKASH NUMBER) FROM FIRESTORE --------
        // Loading state with skeleton effect while fetching number
        numberSpan.innerText = "লোড হচ্ছে...";
        numberSpan.classList.add("skeleton-shimmer", "text-transparent", "bg-clip-text");
        
        // Subscribe to bKash number from settings doc (Admin panel থেকে রিয়েলটাইম আপডেট)
        let initialLoadDone = false;
        const unsubscribeNumber = db.collection("settings").doc("bkash").onSnapshot((doc) => {
            if(doc.exists && doc.data().number) {
                const bkashNumber = doc.data().number;
                numberSpan.innerText = bkashNumber;
                numberSpan.classList.remove("skeleton-shimmer", "text-transparent", "bg-clip-text");
                numberSpan.classList.add("text-gray-800");
                if(!initialLoadDone) {
                    // first load complete, remove any shimmer effect
                    initialLoadDone = true;
                }
            } else {
                numberSpan.innerText = "নম্বর সেট নেই";
                numberSpan.classList.remove("skeleton-shimmer", "text-transparent", "bg-clip-text");
                numberSpan.classList.add("text-gray-500", "text-xl");
                if(!initialLoadDone) {
                    initialLoadDone = true;
                }
            }
        }, (error) => {
            console.error("Firestore number error:", error);
            numberSpan.innerText = "নেটওয়ার্ক ত্রুটি";
            numberSpan.classList.remove("skeleton-shimmer", "text-transparent", "bg-clip-text");
            numberSpan.classList.add("text-red-500", "text-base");
        });
        
        // -------- COPY NUMBER FUNCTION WITH TOAST & LOADING CHECK --------
        window.copyNumber = function() {
            let numberText = numberSpan.innerText;
            // Don't copy if it's placeholder / error / loading text
            if(numberText === "লোড হচ্ছে..." || numberText === "নম্বর সেট নেই" || numberText === "নেটওয়ার্ক ত্রুটি" || !numberText) {
                showToast("❌ বৈধ নম্বর পাওয়া যায়নি, একটু পরে চেষ্টা করুন।", true);
                return;
            }
            
            // Extract only digits and plus if needed (clean number)
            let cleanNumber = numberText.replace(/[^\d+]/g, '');
            if(!cleanNumber) cleanNumber = numberText;
            
            navigator.clipboard.writeText(cleanNumber).then(() => {
                showToast("📋 bKash নম্বর কপি হয়েছে! (Send Money করুন)");
                // Visual feedback: temporary highlight effect on number card
                const card = document.getElementById('number-container');
                card.style.backgroundColor = "#fee2e2";
                setTimeout(() => {
                    card.style.backgroundColor = "";
                }, 300);
            }).catch(() => {
                showToast("❌ কপি করতে ব্যর্থ, ম্যানুয়ালি কপি করুন।", true);
            });
        };
        
        // Add enter key support for transaction input
        trxInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendPayment();
            }
        });
        
        // Additional: Check if amount is valid numeric
        if(isNaN(parseFloat(amount)) || parseFloat(amount) <= 0) {
            if(amount !== "0") amountSpan.innerText = "0";
        }
        
        // Beautify: auto uppercase on trx input
        trxInput.addEventListener("input", function(e) {
            this.value = this.value.toUpperCase();
        });
        
        // Cleanup on page unload (optional)
        window.addEventListener("beforeunload", () => {
            if(unsubscribeNumber) unsubscribeNumber();
        });
        
        // Small console log to confirm that TrxID duplicate protection active
        console.log("✅ পেমেন্ট সিস্টেম রেডি | ট্রানজেকশন আইডি ইউনিক চেক সক্রিয় | লোডিং ইফেক্ট চালু");
    </script>
</body>
                            </html>
