<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator - Fixed Version</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; padding: 10px 15px; background: #1b1c1d; border-bottom: 1px solid #333; }
        .balance-box { background: #000; padding: 5px 15px; border-radius: 20px; border: 1px solid #ffc107; color: #ffc107; font-weight: bold; }
        
        /* গেম স্ক্রিন */
        .game-screen { height: 45%; background: radial-gradient(circle at bottom, #2c2d30, #000); position: relative; overflow: hidden; border-bottom: 2px solid #222; }
        #multiplier { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: 900; display: none; z-index: 10; }
        
        /* বিমানের ফিক্সড স্টাইল */
        #plane-container { position: absolute; bottom: 20px; left: -150px; width: 120px; z-index: 5; display: none; }
        #plane-img { width: 100%; filter: drop-shadow(0 0 10px red); }

        #countdown-scene { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; }
        .timer-circle { width: 100px; height: 100px; border: 5px solid #28a745; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; font-weight: bold; border-top-color: transparent; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* বেট প্যানেল */
        .bet-container { display: flex; gap: 10px; padding: 10px; background: #1b1c1d; flex: 1; }
        .bet-card { flex: 1; background: #252629; border-radius: 15px; padding: 15px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
        .amt-box { display: flex; align-items: center; justify-content: space-between; background: #141516; padding: 8px; border-radius: 10px; }
        .amt-box input { background: transparent; border: none; color: white; width: 60px; text-align: center; font-size: 20px; font-weight: bold; outline: none; }
        .btn-main { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; text-transform: uppercase; }
        .btn-bet { background: #28a745; color: white; }
        .btn-cash { background: #ffc107; color: black; display: none; }
        .btn-wait { background: #555; color: #ccc; display: none; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance-box">$ <span id="balance">100.00</span></div>
        <div style="font-size: 12px; color: #888;">ID: <span id="u-id">...</span></div>
    </div>

    <div class="game-screen">
        <div id="countdown-scene">
            <div class="timer-circle"></div>
            <p style="margin-top: 10px;">Flight Start Soon</p>
        </div>
        <div id="multiplier">1.00x</div>
        
        <div id="plane-container">
            <img id="plane-img" src="https://i.ibb.co/LST6m89/aviator-plane.png" alt="Plane">
        </div>
    </div>

    <div class="bet-container">
        <div class="bet-card">
            <div class="amt-box">
                <button onclick="adjust(1, -1)" style="color:white; background:none; border:none; font-size:24px;">-</button>
                <input type="number" id="amt-1" value="10.00">
                <button onclick="adjust(1, 1)" style="color:white; background:none; border:none; font-size:24px;">+</button>
            </div>
            <button id="b-1" class="btn-main btn-bet" onclick="place(1)">Place Bet</button>
            <button id="c-1" class="btn-main btn-cash" onclick="cash(1)">Cash Out</button>
            <button id="w-1" class="btn-main btn-wait">Bet Accepted</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // আপনার ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyDt-HaWzUcM86DBUMBQbyVKxKMqF-ciafw",
            authDomain: "aviator-4ad1c.firebaseapp.com",
            databaseURL: "https://aviator-4ad1c-default-rtdb.firebaseio.com",
            projectId: "aviator-4ad1c",
            storageBucket: "aviator-4ad1c.firebasestorage.app",
            messagingSenderId: "36301605622",
            appId: "1:36301605622:web:68815b8ca921683e4a7ad7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const myId = "User_" + Math.floor(Math.random() * 9000);
        document.getElementById('u-id').innerText = myId;

        let balance = 100.00;
        let gameStatus = "";
        let currentBet = null;
        let currentMult = 1.00;

        // গেম স্টেট মনিটর
        onValue(ref(db, 'game_state'), (snap) => {
            const data = snap.val();
            if(!data) return;
            gameStatus = data.status;

            if(gameStatus === "waiting") {
                showWaiting();
            } else if(gameStatus === "flying") {
                startFlying(data.target_crash);
            } else if(gameStatus === "crashed") {
                handleCrash();
            }
        });

        window.adjust = (id, val) => {
            let el = document.getElementById('amt-' + id);
            el.value = (parseFloat(el.value) + val).toFixed(2);
        };

        window.place = (id) => {
            if(gameStatus !== "waiting") return alert("Wait for next round!");
            let amt = parseFloat(document.getElementById('amt-1').value);
            if(amt > balance) return alert("Not enough balance!");

            balance -= amt;
            document.getElementById('balance').innerText = balance.toFixed(2);
            currentBet = amt;

            set(ref(db, `active_bets/${myId}`), { userId: myId, amount: amt, status: "betting" });
            
            document.getElementById('b-1').style.display = "none";
            document.getElementById('w-1').style.display = "block";
        };

        window.cash = (id) => {
            if(!currentBet || gameStatus !== "flying") return;
            let win = currentBet * currentMult;
            balance += win;
            document.getElementById('balance').innerText = balance.toFixed(2);

            update(ref(db, `active_bets/${myId}`), { status: "won", profit: win.toFixed(2) });
            currentBet = null;

            document.getElementById('c-1').style.display = "none";
            document.getElementById('w-1').innerText = "Won: " + win.toFixed(2);
            document.getElementById('w-1').style.display = "block";
        };

        function showWaiting() {
            document.getElementById('countdown-scene').style.display = "block";
            document.getElementById('multiplier').style.display = "none";
            gsap.set("#plane-container", { display: "none", x: -150, y: 0 });
            
            // বাটন রিসেট
            document.getElementById('b-1').style.display = "block";
            document.getElementById('c-1').style.display = "none";
            document.getElementById('w-1').style.display = "none";
            document.getElementById('w-1').innerText = "Bet Accepted";
        }

        function startFlying(target) {
            document.getElementById('countdown-scene').style.display = "none";
            document.getElementById('multiplier').style.display = "block";
            document.getElementById('multiplier').style.color = "white";
            
            // বিমান অ্যানিমেশন শুরু
            let p = document.getElementById('plane-container');
            p.style.display = "block";
            gsap.to(p, { x: 250, y: -120, duration: 6, ease: "power1.inOut" });

            if(currentBet) {
                document.getElementById('w-1').style.display = "none";
                document.getElementById('c-1').style.display = "block";
            }

            let m = 1.00;
            let timer = setInterval(() => {
                if(gameStatus !== "flying") return clearInterval(timer);
                m += 0.01;
                currentMult = m;
                document.getElementById('multiplier').innerText = m.toFixed(2) + "x";
            }, 100);
        }

        function handleCrash() {
            document.getElementById('multiplier').style.color = "red";
            gsap.to("#plane-container", { x: 800, y: -300, opacity: 0, duration: 1.5 });
            
            if(currentBet) {
                update(ref(db, `active_bets/${myId}`), { status: "lost" });
                currentBet = null;
            }
            setTimeout(() => { remove(ref(db, 'active_bets')); }, 3000);
        }
    </script>
</body>
</html>
